{{- if .Values.api.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.api.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    # Binds this ServiceAccount to the user-assigned managed identity so pods
    # using it can federate to Azure via Workload Identity.
    azure.workload.identity/client-id: {{ .Values.api.serviceAccount.clientId | quote }}
{{- end }}
