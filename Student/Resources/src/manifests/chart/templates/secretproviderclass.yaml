{{- if .Values.api.workloadIdentity.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.api.keyVault.secretProviderClass }}
  namespace: {{ .Release.Namespace }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    # Workload Identity: authenticate as the user-assigned managed identity.
    clientID: {{ .Values.api.serviceAccount.clientId | quote }}
    keyvaultName: {{ .Values.api.keyVault.name | quote }}
    cloudName: ""
    objects: |
      array:
        - |
          objectName: {{ .Values.api.keyVault.secretName }}
          objectType: secret
    tenantId: {{ .Values.api.keyVault.tenantId | quote }}
  # Sync the Key Vault secret into a Kubernetes Secret the Deployment reads.
  secretObjects:
    - data:
        - key: connectionString
          objectName: {{ .Values.api.keyVault.secretName }}
      secretName: {{ .Values.api.keyVault.syncedSecretName }}
      type: Opaque
{{- end }}
